name: Bug report
description: Report reproducible unexpected behavior in loommux.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not include credentials, private workspace paths, or sensitive output."
  - type: input
    id: version
    attributes:
      label: loommux version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Python version, operating system, and MCP client.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest safe sequence of tool calls or cells that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
