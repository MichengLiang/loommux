name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run pytest
      - run: uv run ruff check src tests
      - run: uv run basedpyright src
      - run: uv build
      - run: uv run twine check dist/*
