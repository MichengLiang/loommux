name: Release loommux

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.10
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/loommux
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Verify tagged package version
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if [ "${RELEASE_TAG#v}" = "$RELEASE_TAG" ]; then
            echo "Publishing requires a v<version> tag."
            exit 1
          fi
          package_version="$(uv run python -c 'import tomllib; from pathlib import Path; print(tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"])')"
          if [ "$package_version" != "${RELEASE_TAG#v}" ]; then
            echo "Tag $RELEASE_TAG does not match package version $package_version."
            exit 1
          fi
      - run: uv sync --group dev
      - run: uv run pytest
      - run: uv run ruff check src tests
      - run: uv run basedpyright src
      - run: uv build
      - run: uv run twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Extract changelog entry
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          python - "$RELEASE_TAG" <<'PY'
          from pathlib import Path
          import sys

          tag = sys.argv[1]
          version = tag.removeprefix("v")
          lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          start = next(
              (index for index, line in enumerate(lines) if line.startswith(f"## [{version}]")),
              None,
          )
          if start is None:
              raise SystemExit(f"CHANGELOG.md has no entry for {version}")
          end = next(
              (
                  index
                  for index in range(start + 1, len(lines))
                  if lines[index].startswith("## [")
              ),
              len(lines),
          )
          notes_lines = lines[start + 1 : end]
          while notes_lines and (not notes_lines[-1].strip() or notes_lines[-1].startswith("[")):
              notes_lines.pop()
          notes = "\n".join(notes_lines).strip()
          if not notes:
              raise SystemExit(f"CHANGELOG.md entry for {version} has no release notes")
          Path("release-notes.md").write_text(f"{notes}\n", encoding="utf-8")
          PY
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          title="loommux ${RELEASE_TAG#v}"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$title" --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" --title "$title" --notes-file release-notes.md
          fi
